name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  # ── 1. Lint & type-check (fast, no GPU needed) ──────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: ruff format check
        run: uv run ruff format --check src/ tests/

      - name: ruff lint
        run: uv run ruff check src/ tests/

      - name: mypy type check
        run: uv run mypy src/ --ignore-missing-imports

  # ── 2. Test matrix across supported Python versions ─────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov=image_classifier \
            --cov-report=term-missing \
            --cov-report=xml:coverage-${{ matrix.python-version }}.xml \
            --cov-fail-under=80 \
            tests/test_metadata.py tests/test_database.py tests/test_classifier.py

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage-${{ matrix.python-version }}.xml

  # ── 3. Security scan ─────────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: uv tool install bandit

      - name: Run bandit
        run: bandit -r src/ -ll --exit-zero
